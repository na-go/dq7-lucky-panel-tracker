name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pywin32

      - name: Build exe
        run: pyinstaller LuckyPanelTracker.spec --noconfirm

      - name: Create zip
        run: Compress-Archive -Path dist/LuckyPanelTracker/* -DestinationPath LuckyPanelTracker-${{ github.ref_name }}.zip
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: LuckyPanelTracker-*.zip
          generate_release_notes: true
